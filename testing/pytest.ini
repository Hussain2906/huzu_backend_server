[pytest]
addopts = -ra
markers =
    unit: backend unit tests
    integration: backend integration tests
    contract: api contract tests
    smoke: fast smoke tests
    slow: longer running tests
    concurrency: concurrency/race tests
    csv: csv import tests
    auth: auth tests
    e2e: frontend e2e (if collected)

# avoid noisy warnings from deps
filterwarnings =
    ignore::DeprecationWarning

# include tests in these paths
testpaths =
    testing/tests

norecursedirs =
    app
    .pytest_cache
    reports
